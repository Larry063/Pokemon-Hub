<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Pokemon hub</title>
    <link rel="stylesheet" href="css/detail.css" />

</head>

<body>
    <div class="info-container">
        <div id="navigation">
            <div id="left_page">
                <svg viewBox="0 0 250 100" preserveAspectRatio="none" width="100%" height="100%">
                    <polygon points="0,0 0,75 138,75 158,40 250,40 250,0"
                        style="fill: #f2f2f2; stroke: black; stroke-width: 3;" />
                    <polygon points="0,75 138,75 158,40 250,40 250,100 0,100"
                        style="fill: rgb(205, 47, 47); stroke: black; stroke-width: 3;" />
                </svg>
                <div class="nav-content">
                    <div id="go_left">Left</div>
                </div>
            </div>
            <div class="custom-select">
                <div class="select-selected">

                    <span class="arrow-icon"></span>
                </div>
                <div class="select-items select-hide">

                </div>
            </div>

            <div id="right_page">
                <svg viewBox="0 0 250 100" preserveAspectRatio="none" width="100%" height="100%">
                    <polygon points="0,0 0,40 138,40 158,75 250,75 250,0"
                        style="fill: #f2f2f2; stroke: black; stroke-width: 3;" />
                    <polygon points="0,40 138,40 158,75 250,75 250,100 0,100"
                        style="fill: rgb(205, 47, 47); stroke: black; stroke-width: 3;" />
                </svg>
                <div class="nav-content">
                    <div id="go_right">Right</div>
                </div>
            </div>
        </div>
        <div id="detail_container">
            <div id="title"></div>
            <div class="horizontal-layout">
                <div id="race_data">

                </div>
                <div id="pokemon_value">
                    <div id="picture_container">
                    </div>
                    <div id="pokemon_ability">
                    </div>
                </div>
            </div>
            <div id="row">
                <div id="desp">
                    <h2>Description</h2>
                    <div id="description">
                    </div>
                    <h3>Type</h3>
                    <div id="ability">
                    </div>
                </div>
                <div id="weak_res_contianer">
                    <h3>restraint</h3>
                    <div id="restraint">
                    </div>
                    <h3>weekness</h3>
                    <div id="weekness">
                    </div>
                </div>
            </div>
            <div id="evolution">

            </div>
        </div>
        <a href="pokedex.html" id="back">Back To Pokedex</a>
        <div class="carousel-wrapper">
            <button id="card_left" class="nav-btn">❮</button>

            <div id="card_container" class="cards-list"></div>

            <button id="card_right" class="nav-btn">❯</button>
        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/@tcgdex/sdk@2/dist/tcgdex.browser.js"></script>
    <script src="js/detail.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="js/navbar.js"></script>
</body>

</html>
